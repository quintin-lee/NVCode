# GitHub Actions Workflow for NvCode
# 自动打包并发布离线安装程序 (.zip 便携版)

name: Build and Release NvCode

on:
  push:
    tags:
      - 'v*' # 当推送以 v 开头的标签时触发 (例如 v1.0.0)
  workflow_dispatch: # 允许手动触发

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 允许上传 Release 资源

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes
            substituters = https://cache.nixos.org
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431oheimd5cE5oUlA434HPMQFGspcDShjY=

      - name: Validate Flake
        run: |
          nix flake check --no-build

      - name: Download Tools
        run: |
          echo "nix develop will provide tool chain (ripgrep, fd, fzf, neovide, etc.)"

      - name: Build Offline Installer
        run: |
          chmod +x scripts/build_offline.sh
          # nix bundle 创建自包含 AppImage (从 Nix 二进制缓存下载，不会从源编译)
          nix develop -c ./scripts/build_offline.sh
        timeout-minutes: 30

      - name: Get Package Name
        id: get_filename
        run: |
          FILENAME=$(ls *.zip | head -n 1)
          echo "FILENAME=$FILENAME" >> $GITHUB_ENV

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ${{ env.FILENAME }}
          body: |
            ## 🚀 NvCode 离线便携包 (Portable ZIP)
            
            这是为您自动打包的全量离线便携包。
            
            ### 📦 包含内容
            - Neovim (最新版)
            - 全量插件 (已预同步)
            - 常用依赖 (rg, fd, fzf, LSPs)
            - 图形化支持 (Neovide)
            
            ### 🛠️ 使用方法
            1. 下载 `${{ env.FILENAME }}` 并解压。
            2. 运行 `./run_offline.sh` (终端模式) 或 `./run_gui_offline.sh` (图形模式)。
            3. 或者执行 `./install.sh` 进行系统集成。
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
