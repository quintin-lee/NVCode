# GitHub Actions Workflow for NvCode
# 自动打包并发布离线安装程序 (.run)

name: Build and Release NvCode

on:
  push:
    tags:
      - 'v*' # 当推送以 v 开头的标签时触发 (例如 v1.0.0)
  workflow_dispatch: # 允许手动触发

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 允许上传 Release 资源

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes
            substituters = https://mirrors.cernet.edu.cn/nix-channels/store https://cache.nixos.org
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY=

      - name: Validate Flake
        run: |
          nix flake check --no-build

      - name: Build Nix Package
        run: |
          nix build .#nvcode --no-link

      - name: Build Offline Installer
        run: |
          # 确保脚本可执行
          chmod +x scripts/build_offline.sh
          # 使用 nix develop 进入开发环境运行，确保 makeself/rsync 可用
          nix develop --command ./scripts/build_offline.sh

      - name: Get Package Name
        id: get_filename
        run: |
          # 获取生成的 .zip 文件名
          FILENAME=$(ls *.zip | head -n 1)
          echo "FILENAME=$FILENAME" >> $GITHUB_ENV
          echo "PACKAGE_NAME=$FILENAME" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ${{ env.FILENAME }}
          body: |
            ## 🚀 NvCode 离线便携包 (Portable ZIP)
            
            这是为您自动打包的全量离线便携包。
            
            ### 📦 包含内容
            - Neovim (最新版)
            - 全量插件 (已预同步)
            - 常用依赖 (rg, fd, fzf, LSPs)
            - 图形化支持 (Neovide)
            
            ### 🛠️ 使用方法
            1. 下载 `${{ env.FILENAME }}` 并解压。
            2. 运行 `./run_offline.sh` (终端模式) 或 `./run_gui_offline.sh` (图形模式)。
            3. 或者执行 `./install.sh` 进行系统集成。
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
